<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#080808" rx="80" />

  <g transform="translate(68, 101) scale(2.75)">
    <g transform="rotate(-20, 55, 42)">
      <path
        d="M 55 42 C 64 22 88 18 88 36 C 88 54 66 56 55 42 C 44 28 16 24 16 44 C 16 64 40 68 55 42"
        stroke="url(#grad)"
        stroke-width="5.5"
        stroke-linecap="round"
        fill="none"
        filter="url(#glow)"
      />
    </g>
  </g>
</svg>
