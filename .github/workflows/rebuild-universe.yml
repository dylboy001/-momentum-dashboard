name: Rebuild Universe (Monthly)

on:
  schedule:
    # Run on the 1st of every month at 20:00 UTC
    - cron: '0 20 1 * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Rebuild universe
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/rebuild_universe.py

      - name: Commit updated universe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/universe_config.json
          git diff --cached --quiet || git commit -m "chore: rebuild universe config [skip ci] [vercel skip]"
          git push
