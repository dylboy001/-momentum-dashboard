name: Update Daily Picks

on:
  schedule:
    # Run at 21:00 UTC (5pm ET) every weekday — after US market close
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests

      - name: Run picks generator
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python scripts/v2_picks_generator.py

      - name: Upload picks via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/dylboy001/-momentum-dashboard/contents/data/picks_raw.json" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          CONTENT=$(base64 -w 0 data/picks_raw.json)

          curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/dylboy001/-momentum-dashboard/contents/data/picks_raw.json" \
            -d "{\"message\":\"chore: update daily picks [skip ci] [vercel skip]\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}"

          echo "picks_raw.json updated via GitHub API"
